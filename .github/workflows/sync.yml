name: Sync to Hugging Face
on:
  push:
    branches: [main, dev] 
  workflow_dispatch: 

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
        
          CURRENT_BRANCH=${GITHUB_REF_NAME}
          
      
          git push --force https://robot:$HF_TOKEN@huggingface.co/spaces/qwefsdfsdsg/mdk ${CURRENT_BRANCH}:${CURRENT_BRANCH}
