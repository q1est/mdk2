name: Sync to Hugging Face

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Remove images for HF
        run: |
          find . -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \) -delete

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          CURRENT_BRANCH=${GITHUB_REF_NAME}

          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action"

          git remote add hf https://robot:$HF_TOKEN@huggingface.co/spaces/qwefsdfsdsg/mdk || true

          git add .
          git commit -m "sync without images" || echo "No changes to commit"

          git push hf ${CURRENT_BRANCH}
