name: Sync to Hugging Face

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face (clean)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          CURRENT_BRANCH=${GITHUB_REF_NAME}

          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action"

          # удаляем картинки
          find . -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \) -delete

          # создаём чистую ветку без истории
          git checkout --orphan clean-branch
          git add .
          git commit -m "clean commit"

          # выбираем Space
          if [ "$CURRENT_BRANCH" = "main" ]; then
            HF_SPACE="qwefsdfsdsg/mdk"
          elif [ "$CURRENT_BRANCH" = "dev" ]; then
            HF_SPACE="qwefsdfsdsg/mdk-dev"
          else
            echo "Unknown branch"
            exit 1
          fi

          echo "Pushing to $HF_SPACE"

          # ВСЕГДА пушим в main Space
          git push --force https://robot:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE clean-branch:main
