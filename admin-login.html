<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - Админ панель MDK2</title>
  
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Tabler Icons -->
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.css" rel="stylesheet">
  
  <!-- Theme CSS -->
  <link href="/admin/css/theme.css" rel="stylesheet">
  
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
    }

    .login-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .login-header {
      text-align: center;
      padding: 40px 20px 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .login-logo {
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }

    .login-body {
      padding: 40px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-control {
      height: 44px;
      border: 1px solid #e0e0e0;
      padding: 10px 15px;
    }

    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.1);
    }

    .btn-login {
      height: 44px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      width: 100%;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #5568d3 0%, #6b3a92 100%);
    }

    .demo-login {
      margin-top: 15px;
    }

    .demo-login small {
      color: #999;
      display: block;
      text-align: center;
      margin-top: 10px;
    }

    .login-footer {
      text-align: center;
      padding: 20px;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">MDK2</div>
        <h4 class="text-muted">Админ Панель</h4>
      </div>
      
      <div class="login-body">
        <form id="login-form">
          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input 
              type="email" 
              class="form-control" 
              id="email" 
              name="email" 
              placeholder="admin@example.com"
              required
            >
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Пароль</label>
            <input 
              type="password" 
              class="form-control" 
              id="password" 
              name="password" 
              placeholder="••••••••"
              required
            >
          </div>

          <button type="submit" class="btn btn-login btn-primary">
            <span class="spinner-border spinner-border-sm me-2" id="loading-spinner" style="display: none;"></span>
            Войти
          </button>
        </form>

        <div class="demo-login text-center mt-3">
          <button type="button" id="demo-login-button" class="btn btn-outline-secondary btn-sm">
            Демо вход
          </button>
          <small>Используйте demo данные для тестирования</small>
        </div>
      </div>

      <div class="login-footer">
        MDK2 Ресторан © 2024 | Все права защищены
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="/admin/config.js"></script>
  <script src="/admin/js/config.js"></script>
  <script src="/admin/js/storage.js"></script>
  <script src="/admin/js/auth.js"></script>
  <script src="/admin/js/api.js"></script>
  <script src="/admin/js/utils.js"></script>
  <script src="/admin/js/pages/login.js"></script>
</body>
</html>
