<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Меню - Админ панель MDK2</title>
  
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Tabler Icons -->
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.css" rel="stylesheet">
  
  <!-- Theme CSS -->
  <link href="/admin/css/theme.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="/admin/menu.html">
        <i class="ti ti-home"></i> MDK2 Админ
      </a>
      
      <div class="ms-auto d-flex align-items-center gap-3">
        <div class="user-menu">
          <div class="user-avatar" id="user-avatar">A</div>
          <div>
            <div class="fw-bold" id="user-name">Администратор</div>
            <small class="text-muted" id="user-email">admin@mdk2.com</small>
          </div>
        </div>
        <button class="btn btn-outline-danger btn-sm" id="logout-button">
          <i class="ti ti-logout"></i> Выход
        </button>
      </div>
    </div>
  </nav>

  <div class="d-flex">
    <!-- Sidebar -->
    <nav class="sidebar" style="width: 250px;">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link active" href="/admin/menu.html">
            <i class="ti ti-utensils"></i> Меню
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/admin/orders.html">
            <i class="ti ti-receipt"></i> Заказы
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#analytics">
            <i class="ti ti-chart-bar"></i> Аналитика
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#settings">
            <i class="ti ti-settings"></i> Настройки
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content flex-grow-1">
      <div class="page-header">
        <h1><i class="ti ti-utensils"></i> Управление меню</h1>
        <div class="btn-group" role="group">
          <button type="button" class="btn btn-outline-secondary" id="menu-refresh-button" title="Обновить">
            <i class="ti ti-refresh"></i>
          </button>
          <button type="button" class="btn btn-primary" id="menu-add-button">
            <i class="ti ti-plus"></i> Добавить блюдо
          </button>
        </div>
      </div>

      <!-- Filters -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-6">
              <div class="search-box">
                <input 
                  type="text" 
                  class="form-control" 
                  id="menu-search" 
                  placeholder="Поиск по названию или описанию..."
                >
              </div>
            </div>
            <div class="col-md-6">
              <select class="form-select" id="menu-category-filter">
                <option value="">Все категории</option>
                <option value="appetizers">Закуски</option>
                <option value="mains">Основные блюда</option>
                <option value="desserts">Десерты</option>
                <option value="drinks">Напитки</option>
                <option value="salads">Салаты</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Menu Table -->
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover" id="menu-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Название</th>
                  <th>Цена</th>
                  <th>Категория</th>
                  <th>Статус</th>
                  <th>Действия</th>
                </tr>
              </thead>
              <tbody id="menu-table-body">
                <tr>
                  <td colspan="6" class="text-center py-5">
                    <div class="spinner-border" role="status">
                      <span class="visually-hidden">Загрузка...</span>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Create/Edit Menu Item -->
  <div class="modal fade" id="menu-modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Добавить блюдо</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        
        <form id="menu-form">
          <div class="modal-body">
            <div class="mb-3">
              <label for="menu-name" class="form-label">Название *</label>
              <input 
                type="text" 
                class="form-control" 
                id="menu-name"
                name="name"
                required
              >
            </div>

            <div class="mb-3">
              <label for="menu-description" class="form-label">Описание</label>
              <textarea 
                class="form-control" 
                id="menu-description"
                name="description"
                rows="3"
              ></textarea>
            </div>

            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="menu-price" class="form-label">Цена *</label>
                  <input 
                    type="number" 
                    class="form-control" 
                    id="menu-price"
                    name="price"
                    step="0.01"
                    min="0"
                    required
                  >
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="menu-category" class="form-label">Категория *</label>
                  <select class="form-select" id="menu-category" name="category" required>
                    <option value="">Выберите категорию</option>
                  </select>
                </div>
              </div>
            </div>

         <div class="mb-3">
  <label class="form-label">Изображение</label>
  <input type="file" class="form-control mb-2" id="image-upload-input" accept=".jpg,.jpeg,.png,.webp">
  <div id="image-preview" class="mb-2" style="display:none;">
    <img id="image-preview-img" src="" style="max-height:120px; border-radius:8px;">
  </div>
  <input type="text" class="form-control" name="image_url" placeholder="URL изображения (заполняется автоматически)">
</div>

            <div class="form-check">
              <input 
                type="checkbox" 
                class="form-check-input" 
                id="menu-available"
                name="available"
                checked
              >
              <label class="form-check-label" for="menu-available">
                Доступно для заказа
              </label>
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
            <button type="submit" class="btn btn-primary">Сохранить</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="/admin/config.js"></script>
  <!-- App Scripts (order matters) -->
  <script src="/admin/js/config.js"></script>
  <script src="/admin/js/storage.js"></script>
  <script src="/admin/js/auth.js"></script>
  <script src="/admin/js/api.js"></script>
  <script src="/admin/js/utils.js"></script>
  <script src="/admin/js/modules/menuTable.js"></script>
  <script src="/admin/js/modules/menuForm.js"></script>
  <script src="/admin/js/pages/menu.js"></script>
</body>
</html>
