<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Меню — Пьяный Гейгер</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<a href="index.html" class="back-home-btn">
  ← На главную
</a>

<button class="cart-btn" id="cartBtn">
  🛒
  <span class="cart-count" id="cartCount">0</span>
</button>

<div class="cart-modal" id="cartModal">
  <div class="cart-window">
    <h2>Корзина</h2>
    <ul class="cart-list" id="cartList"></ul>

    <div class="cart-total">
      <span>Итого:</span>
      <span id="totalPrice">0 ₽</span>
    </div>
    
    <button class="order-btn" id="orderBtn">Заказать</button>
    <button class="cart-close" id="closeCart">Закрыть</button>
    <button class="clear-cart-btn" id="clearCart"> Очистить корзину</button>
    
  </div>
</div>

<header style="padding:60px 20px 20px; text-align:center;">
  <h1>Наше меню</h1>
</header>



<nav>
  <button class="active" data-target="snacks">Закуски</button>
  <button data-target="main">Основные</button>
  <button data-target="desserts">Десерты</button>
  <button data-target="drinks">Напитки</button>
</nav>

<main>
  <!-- Меню будет загружено динамически из API -->
</main>

<footer>
© Бар «Пьяный Гейгер». Вход на свой страх и риск.
</footer>
<!-- ===== ORDER MODAL ===== -->
<div class="booking-modal" id="orderModal">
  <div class="booking-window">
    <button class="booking-close" id="closeOrder">×</button>

    <h2 class="booking-title">Оформление заказа</h2>
    <p class="booking-subtitle">
      Укажите данные для доставки. Курьер уже надевает противогаз.
    </p>

    <form class="booking-form" id="orderForm">

      <div class="form-group">
        <label for="orderName">Имя *</label>
        <input type="text" id="orderName" required>
      </div>

      <div class="form-group">
        <label for="orderPhone">Телефон *</label>
        <div class="phone-input-wrapper">
          <span class="phone-prefix">+7</span>
          <input 
            type="tel"
            id="orderPhone"
            placeholder="9001234567"
            pattern="[0-9]{10}"
            maxlength="10"
            required>
        </div>
      </div>
      <div class="form-group">
        <label for="orderTelegram">Telegram username *</label>
        <input
        type="text"
        id="orderTelegram"
        placeholder="@username"
        required>
      </div>
      <div class="form-group">
        <label for="orderAddress">Адрес доставки *</label>
        <textarea id="orderAddress" required placeholder="Улица, дом, квартира..."></textarea>
      </div>

      <button type="submit" class="booking-submit">
        Подтвердить заказ
      </button>

    </form>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</html>
